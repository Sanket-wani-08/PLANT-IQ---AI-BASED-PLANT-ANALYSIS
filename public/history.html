<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scan History - Plant IQ</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet" />
    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background: radial-gradient(circle at 50% 50%, #f4fbf7 0%, #e8f5e9 100%);
            color: #2c3e50;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            background: #1b5e20;
            color: white;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 12px rgba(27, 94, 32, 0.15);
        }

        .navbar h2 {
            margin: 0;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ffffff;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-links a {
            color: rgba(255, 255, 255, 0.9);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s, transform 0.1s;
        }

        .nav-links a:hover {
            color: #a5d6a7;
        }

        #userLink {
            background: rgba(255, 255, 255, 0.15);
            padding: 6px 14px;
            border-radius: 20px;
            transition: background 0.2s;
        }

        #userLink:hover {
            background: rgba(255, 255, 255, 0.25);
            color: #fff;
        }

        .container {
            flex: 1;
            max-width: 900px;
            margin: 40px auto;
            background: #ffffff;
            border-radius: 16px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(27, 94, 32, 0.08);
            border: 1px solid rgba(165, 214, 167, 0.2);
            width: 100%;
            box-sizing: border-box;
        }

        h1, h2 {
            color: #1b5e20;
            font-weight: 700;
        }

        .history-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 20px;
            position: relative;
        }

        .history-card {
            background: #fcfcfc;
            border: 1px solid #eafaf1;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex;
            flex-direction: column;
        }

        .history-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 6px 15px rgba(39, 174, 96, 0.15);
        }

        .history-img-wrapper {
            width: 100%;
            height: 180px;
            overflow: hidden;
            background: #eee;
            position: relative;
        }

        .history-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .history-info {
            padding: 15px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .history-title {
            font-size: 18px;
            font-weight: bold;
            color: #145a32;
            margin: 0 0 5px 0;
            text-transform: capitalize;
        }

        .history-date {
            font-size: 12px;
            color: #7f8c8d;
            margin-bottom: 15px;
        }

        .card-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 8px 10px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: background 0.2s;
            text-align: center;
        }

        .btn-view {
            background: #27ae60;
            color: white;
        }

        .btn-view:hover {
            background: #1e8449;
        }

        .btn-pdf {
            background: #e74c3c;
            color: white;
        }

        .btn-pdf:hover {
            background: #c0392b;
        }

        .btn-delete {
            background: #fdf2f2;
            color: #ec7063;
            border: 1px solid #fadbd8 !important;
        }

        .btn-delete:hover {
            background: #fadbd8;
            color: #c0392b;
        }

        .no-history {
            text-align: center;
            padding: 40px;
            background: #fdfefe;
            border-radius: 10px;
            border: 2px dashed #d4efdf;
            color: #7f8c8d;
            grid-column: 1 / -1;
        }

        .no-history i {
            font-size: 48px;
            color: #27ae60;
            margin-bottom: 15px;
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            overflow: auto;
            background-color: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background-color: #fefefe;
            margin: 10% auto;
            padding: 25px;
            border-radius: 12px;
            border: 1px solid #888;
            width: 80%;
            max-width: 650px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.2);
            position: relative;
            animation: modalFade 0.3s;
        }

        @keyframes modalFade {
            from {transform: translateY(-20px); opacity: 0;}
            to {transform: translateY(0); opacity: 1;}
        }

        .close {
            color: #aaa;
            position: absolute;
            right: 20px;
            top: 15px;
            font-size: 28px;
            font-weight: bold;
            cursor: pointer;
        }

        .close:hover,
        .close:focus {
            color: black;
            text-decoration: none;
        }

        .modal-body {
            margin-top: 15px;
            max-height: 400px;
            overflow-y: auto;
            line-height: 1.6;
        }

        .footer {
            background: #145a32;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 40px;
        }

        #loading {
            text-align: center;
            padding: 40px;
            grid-column: 1 / -1;
            font-size: 18px;
            color: #1e8449;
        }
    </style>
    <script>
        if (!localStorage.getItem("token")) {
            window.location.href = "/login.html";
        }
    </script>
</head>
<body>

    <div class="navbar">
        <h2>🌿 Plant IQ</h2>
        <div class="nav-links">
            <a href="/">Home</a>
            <a href="/history">History</a>
            <a href="/profile">Profile</a>
            <a href="/profile" id="userLink" style="font-weight: bold; color: #d4efdf; display: inline-flex; align-items: center; gap: 5px;">
                <i class="fas fa-user-circle"></i> <span id="userGreeting"></span>
            </a>
            <a href="#" id="logoutBtn" style="color: #fadbd8;">Logout</a>
        </div>
    </div>

    <div class="container">
        <h1><i class="fas fa-history"></i> Your Scan History</h1>
        <p>Browse through your previous plant scans and download PDF reports.</p>

        <div class="history-grid" id="historyGrid">
            <div id="loading">
                <i class="fas fa-spinner fa-spin"></i> Loading scan history...
            </div>
        </div>
    </div>

    <!-- The Modal -->
    <div id="detailsModal" class="modal">
        <div class="modal-content">
            <span class="close" id="closeModal">&times;</span>
            <h2 id="modalTitle">Plant Details</h2>
            <div class="modal-body" id="modalBody"></div>
        </div>
    </div>

    <div class="footer">
        <p>© 2026 Plant IQ | Built with ❤️ by Sanket</p>
    </div>

    <script>
        // Display greeting
        const username = localStorage.getItem("user");
        if (username) {
            document.getElementById("userGreeting").textContent = `Hi, ${username}`;
        }

        // Logout
        document.getElementById("logoutBtn").addEventListener("click", (e) => {
            e.preventDefault();
            localStorage.removeItem("token");
            localStorage.removeItem("user");
            window.location.href = "/login.html";
        });

        const historyGrid = document.getElementById("historyGrid");
        const detailsModal = document.getElementById("detailsModal");
        const closeModal = document.getElementById("closeModal");
        const modalTitle = document.getElementById("modalTitle");
        const modalBody = document.getElementById("modalBody");

        closeModal.onclick = function() {
            detailsModal.style.display = "none";
        }

        window.onclick = function(event) {
            if (event.target == detailsModal) {
                detailsModal.style.display = "none";
            }
        }

        async function loadHistory() {
            try {
                const response = await fetch("/api/history", {
                    method: "GET",
                    headers: {
                        "Authorization": localStorage.getItem("token")
                    }
                });

                if (response.status === 401) {
                    localStorage.removeItem("token");
                    window.location.href = "/login.html";
                    return;
                }

                const data = await response.json();
                historyGrid.innerHTML = "";

                if (data.length === 0) {
                    historyGrid.innerHTML = `
                        <div class="no-history">
                            <i class="fas fa-seedling"></i>
                            <h3>No history found</h3>
                            <p>Go to the Home page and scan a plant image to get started!</p>
                        </div>
                    `;
                    return;
                }

                data.forEach(item => {
                    const card = document.createElement("div");
                    card.className = "history-card";
                    
                    const dateFormatted = new Date(item.createdAt).toLocaleDateString(undefined, {
                        year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit'
                    });

                    card.innerHTML = `
                        <div class="history-img-wrapper">
                            <img class="history-img" src="${item.image}" alt="${item.plantName}">
                        </div>
                        <div class="history-info">
                            <div>
                                <h3 class="history-title">${item.plantName}</h3>
                                <div class="history-date">${dateFormatted}</div>
                            </div>
                            <div class="card-actions">
                                <button class="btn btn-view" onclick="viewDetails('${item.plantName}', \`${item.result.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`)">
                                    <i class="fas fa-eye"></i> View
                                </button>
                                <button class="btn btn-pdf" onclick="downloadReport(\`${item.result.replace(/`/g, '\\`').replace(/\$/g, '\\$')}\`, '${item.image}')">
                                    <i class="fas fa-file-pdf"></i> PDF
                                </button>
                                <button class="btn btn-delete" onclick="deleteHistoryItem('${item._id}', this)">
                                    <i class="fas fa-trash-alt"></i> Delete
                                </button>
                            </div>
                        </div>
                    `;
                    historyGrid.appendChild(card);
                });

            } catch (err) {
                console.error("Error loading history:", err);
                historyGrid.innerHTML = `
                    <div class="no-history" style="border-color: #e74c3c; background-color: #fdf2f2;">
                        <i class="fas fa-exclamation-triangle" style="color: #e74c3c;"></i>
                        <h3>Failed to load history</h3>
                        <p>${err.message}</p>
                    </div>
                `;
            }
        }

        function viewDetails(name, result) {
            modalTitle.textContent = name;
            modalBody.innerHTML = `<p>${result.replace(/\n/g, '<br>')}</p>`;
            detailsModal.style.display = "block";
        }

        async function downloadReport(result, image) {
            try {
                const response = await fetch("/download", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json",
                        "Authorization": localStorage.getItem("token")
                    },
                    body: JSON.stringify({ result, image })
                });

                if (response.ok) {
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement("a");
                    a.href = url;
                    a.download = "Plant_Analysis_Report.pdf";
                    document.body.appendChild(a);
                    a.click();
                    a.remove();
                } else {
                    alert("Failed to generate and download the PDF report.");
                }
            } catch (err) {
                console.error("Error downloading PDF:", err);
                alert("Error generating PDF report.");
            }
        }
        async function deleteHistoryItem(id, button) {
            if (!confirm("Are you sure you want to delete this scan record from your history?")) {
                return;
            }
            try {
                const response = await fetch(`/api/history/${id}`, {
                    method: "DELETE",
                    headers: {
                        "Authorization": localStorage.getItem("token")
                    }
                });

                if (response.ok) {
                    const card = button.closest(".history-card");
                    if (card) {
                        // Animate card deletion using FLIP
                        const cards = Array.from(historyGrid.children).filter(c => c !== card);
                        const firstPositions = cards.map(c => c.getBoundingClientRect());

                        const cardRect = card.getBoundingClientRect();
                        const gridRect = historyGrid.getBoundingClientRect();

                        card.style.position = "absolute";
                        card.style.left = `${cardRect.left - gridRect.left}px`;
                        card.style.top = `${cardRect.top - gridRect.top}px`;
                        card.style.width = `${cardRect.width}px`;
                        card.style.height = `${cardRect.height}px`;
                        card.style.margin = "0";
                        card.style.zIndex = "10";

                        const lastPositions = cards.map(c => c.getBoundingClientRect());

                        card.style.transition = "all 0.3s ease";
                        card.style.opacity = "0";
                        card.style.transform = "scale(0.8)";

                        cards.forEach((c, index) => {
                            const firstPos = firstPositions[index];
                            const lastPos = lastPositions[index];

                            const deltaX = firstPos.left - lastPos.left;
                            const deltaY = firstPos.top - lastPos.top;

                            c.style.transition = "none";
                            c.style.transform = `translate(${deltaX}px, ${deltaY}px)`;
                        });

                        historyGrid.offsetHeight; // trigger reflow

                        cards.forEach(c => {
                            c.style.transition = "transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1)";
                            c.style.transform = "translate(0, 0)";
                        });

                        setTimeout(() => {
                            card.remove();
                            if (historyGrid.children.length === 0) {
                                loadHistory();
                            }
                        }, 300);
                    }
                } else {
                    const data = await response.json();
                    alert(data.error || "Failed to delete history record.");
                }
            } catch (err) {
                console.error("Error deleting history:", err);
                alert("Error deleting history record.");
            }
        }

        // Initialize
        loadHistory();
    </script>
</body>
</html>
